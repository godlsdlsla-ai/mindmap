    // ↓↓↓ 아래에 mindmap.jsx 전체 코드 붙여넣기 ↓↓↓
import { useState, useEffect, useRef } from "react";

// ─── Storage ──────────────────────────────────────────────────────────────────
const STORAGE_KEY = "mindmap_나_v4";
async function loadData() {
  try { const r = await window.storage.get(STORAGE_KEY); if (r?.value) return JSON.parse(r.value); } catch {}
  try { const ls = localStorage.getItem(STORAGE_KEY); if (ls) return JSON.parse(ls); } catch {}
  return null;
}
async function saveData(d) {
  const s = JSON.stringify(d);
  try { await window.storage.set(STORAGE_KEY, s); } catch {}
  try { localStorage.setItem(STORAGE_KEY, s); } catch {}
}

// ─── Default ──────────────────────────────────────────────────────────────────
const defaultData = {
  id: "root", label: "나", color: "#f0c040", priority: 1, importance: 5, note: "",
  children: [
    { id: "career", label: "커리어", color: "#6ee7b7", priority: 1, importance: 5, note: "", children: [
      { id: "career-1", label: "단기목표", color: "#34d399", priority: 1, importance: 4, note: "", children: [] },

    ]},
    { id: "worry", label: "고민", color: "#c4b5fd", priority: 5, importance: 3, note: "", children: [
      { id: "worry-1", label: "해결중", color: "#a78bfa", priority: 1, importance: 3, note: "", children: [] },
      { id: "worry-2", label: "미해결", color: "#a78bfa", priority: 2, importance: 4, note: "", children: [] },
    ]},
  ],
};

// ─── Tree helpers ─────────────────────────────────────────────────────────────
function flattenNodes(node, path = []) {
  const cur = { ...node, path: [...path, node.label] };
  return [cur, ...(node.children || []).flatMap(c => flattenNodes(c, [...path, node.label]))];
}
function findNodeById(node, id) {
  if (!node) return null;
  if (node.id === id) return node;
  for (const c of node.children || []) { const f = findNodeById(c, id); if (f) return f; }
  return null;
}
function updateNodeById(node, id, fn) {
  if (node.id === id) return fn(node);
  return { ...node, children: (node.children || []).map(c => updateNodeById(c, id, fn)) };
}
function deleteNodeById(node, id) {
  return { ...node, children: (node.children || []).filter(c => c.id !== id).map(c => deleteNodeById(c, id)) };
}
function getDepth(root, id, d = 0) {
  if (root.id === id) return d;
  for (const c of root.children || []) { const r = getDepth(c, id, d + 1); if (r !== -1) return r; }
  return -1;
}

const COLORS = ["#f0c040","#6ee7b7","#93c5fd","#f9a8d4","#fcd34d","#c4b5fd","#fdba74","#6dd5ed","#a7f3d0","#fca5a5","#fb923c","#e879f9"];

function priorityLabel(p) { return ["","🔴 최우선","🟠 높음","🟡 보통","🟢 낮음","⚪ 참고"][p] || ""; }
function importanceStars(i) { return "★".repeat(i||0)+"☆".repeat(5-(i||0)); }

// ─── Layout — 모바일 최적화 반경 ──────────────────────────────────────────────
// depth0→root, depth1→큰주제(r=90), depth2→중간(r=160), depth3→작은(r=220)
const RADII = [0, 95, 170, 235, 295];

function calcPositions(node, x, y, angle, spread, depth) {
  const pos = [{ id: node.id, x, y, depth, node }];
  const children = node.children || [];
  if (!children.length) return pos;
  const r = RADII[Math.min(depth, RADII.length - 1)] || 295 + depth * 55;
  const step = spread / Math.max(children.length, 1);
  const start = angle - spread / 2 + step / 2;
  children.forEach((child, i) => {
    const a = start + step * i;
    const cx2 = x + Math.cos(a * Math.PI / 180) * r;
    const cy2 = y + Math.sin(a * Math.PI / 180) * r;
    pos.push(...calcPositions(child, cx2, cy2, a, Math.max(24, step * 0.9), depth + 1));
  });
  return pos;
}

function bezierPath(x1, y1, x2, y2) {
  const mx = (x1 + x2) / 2, my = (y1 + y2) / 2;
  return `M${x1},${y1} Q${mx},${my} ${x2},${y2}`;
}

function nodeR(d) { return d === 0 ? 36 : d === 1 ? 26 : d === 2 ? 20 : 15; }
function nodeFS(d) { return d === 0 ? 13 : d === 1 ? 10 : d === 2 ? 9 : 8; }

// ─── Main ─────────────────────────────────────────────────────────────────────
export default function MindMapApp() {
  const [data, setData] = useState(null);
  const [loaded, setLoaded] = useState(false);
  const [selected, setSelected] = useState(null);
  const [hoveredId, setHoveredId] = useState(null);
  const [searchQ, setSearchQ] = useState("");
  const [searchResults, setSearchResults] = useState([]);
  const [showSearch, setShowSearch] = useState(false);
  const [modal, setModal] = useState(null);      // { type:'view'|'edit', nodeId }
  const [modalForm, setModalForm] = useState({});
  const [addModal, setAddModal] = useState(false); // 주제 추가 모달
  const [addForm, setAddForm] = useState({ label:"", note:"", priority:3, importance:3, color:COLORS[0], parentId:"root" });
  const [tab, setTab] = useState("map");
  const [listFilter, setListFilter] = useState("all");
  const [listSort, setListSort] = useState("priority");
  const [toast, setToast] = useState(null);
  const [dim, setDim] = useState({ w: 800, h: 700 });

  // pan & zoom — stored as ref for animation
  const [zoom, setZoom] = useState(0.85); // 기본 약간 축소해서 전체 보이게
  const [pan, setPan] = useState({ x: 0, y: 0 });
  // smooth animation target
  const animRef = useRef(null);
  const currentPan = useRef({ x: 0, y: 0 });
  const currentZoom = useRef(0.85);
  const targetPan = useRef({ x: 0, y: 0 });
  const targetZoom = useRef(0.85);
  const [, forceUpdate] = useState(0);

  const isPanning = useRef(false);
  const lastPos = useRef({ x: 0, y: 0 });
  const lastDist = useRef(null);
  const lastTouch = useRef(null);
  const saveTimer = useRef(null);

  // ── Load ────────────────────────────────────────────────────────────────
  useEffect(() => {
    loadData().then(d => { setData(d || defaultData); setLoaded(true); });
  }, []);

  // ── Auto-save ───────────────────────────────────────────────────────────
  useEffect(() => {
    if (!data || !loaded) return;
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => saveData(data), 700);
  }, [data, loaded]);

  // ── Dimensions ──────────────────────────────────────────────────────────
  useEffect(() => {
    const up = () => setDim({ w: window.innerWidth, h: window.innerHeight });
    up(); window.addEventListener("resize", up);
    return () => window.removeEventListener("resize", up);
  }, []);

  // ── Search ──────────────────────────────────────────────────────────────
  useEffect(() => {
    if (!data || !searchQ.trim()) { setSearchResults([]); return; }
    const q = searchQ.toLowerCase();
    setSearchResults(flattenNodes(data).filter(n =>
      n.label.toLowerCase().includes(q) || (n.note || "").toLowerCase().includes(q)
    ));
  }, [searchQ, data]);

  // ── Toast ───────────────────────────────────────────────────────────────
  const showToast = msg => { setToast(msg); setTimeout(() => setToast(null), 2000); };

  // ── Map layout ──────────────────────────────────────────────────────────
  const cx = dim.w / 2, cy = dim.h / 2;
  const positions = data ? calcPositions(data, cx + pan.x, cy + pan.y, 270, 360, 0) : [];
  const posMap = Object.fromEntries(positions.map(p => [p.id, p]));

  function getEdges(node) {
    return (node.children || []).flatMap(c => [{ from: node.id, to: c.id }, ...getEdges(c)]);
  }
  const edges = data ? getEdges(data) : [];

  // ── 🎯 Click-to-center: animate pan so clicked node moves to screen center ──
  const animateTo = (targetX, targetY, targetZ) => {
    targetPan.current = { x: targetX, y: targetY };
    targetZoom.current = targetZ;
    if (animRef.current) cancelAnimationFrame(animRef.current);
    const step = () => {
      const dx = targetPan.current.x - currentPan.current.x;
      const dy = targetPan.current.y - currentPan.current.y;
      const dz = targetZoom.current - currentZoom.current;
      if (Math.abs(dx) < 0.3 && Math.abs(dy) < 0.3 && Math.abs(dz) < 0.001) {
        currentPan.current = { ...targetPan.current };
        currentZoom.current = targetZoom.current;
        setPan({ ...currentPan.current });
        setZoom(currentZoom.current);
        return;
      }
      currentPan.current = { x: currentPan.current.x + dx * 0.14, y: currentPan.current.y + dy * 0.14 };
      currentZoom.current = currentZoom.current + dz * 0.14;
      setPan({ ...currentPan.current });
      setZoom(currentZoom.current);
      animRef.current = requestAnimationFrame(step);
    };
    animRef.current = requestAnimationFrame(step);
  };

  const focusOnNode = (nodeId) => {
    // 클릭된 노드의 현재 절대 위치를 계산
    // posMap은 현재 pan 반영 → 노드 위치에서 cx,cy 차이만큼 pan을 이동
    const pos = posMap[nodeId];
    if (!pos) return;
    // 노드를 화면 중앙으로: 현재 pan + (화면중앙 - 노드위치)
    const newPanX = pan.x + (cx - pos.x);
    const newPanY = pan.y + (cy - pos.y);
    currentPan.current = { ...pan };
    currentZoom.current = zoom;
    animateTo(newPanX, newPanY, Math.max(zoom, 1.0));
  };

  // ── Node click ──────────────────────────────────────────────────────────
  const handleNodeClick = (nodeId) => {
    setSelected(nodeId);
    focusOnNode(nodeId);
    const node = findNodeById(data, nodeId);
    if (!node) return;
    setModal({ type: "view", nodeId });
    setModalForm({ label: node.label, note: node.note || "", priority: node.priority || 3, importance: node.importance || 3, color: node.color || COLORS[0] });
  };

  // ── Add node ────────────────────────────────────────────────────────────
  const openAddModal = (preParentId = "root") => {
    setAddForm({ label:"", note:"", priority:3, importance:3, color:COLORS[Math.floor(Math.random()*COLORS.length)], parentId: preParentId });
    setAddModal(true);
  };

  const handleAddConfirm = () => {
    if (!addForm.label.trim()) { showToast("⚠️ 제목을 입력해주세요"); return; }
    const newId = "n" + Date.now();
    setData(d => updateNodeById(d, addForm.parentId, n => ({
      ...n,
      children: [...(n.children || []), {
        id: newId, label: addForm.label.trim(), note: addForm.note,
        priority: parseInt(addForm.priority), importance: parseInt(addForm.importance),
        color: addForm.color, children: []
      }]
    })));
    setAddModal(false);
    showToast("✅ 추가됐어요");
    // 추가 후 해당 부모 노드로 포커스
    setTimeout(() => {
      setSelected(newId);
    }, 300);
  };

  // ── Save edit ───────────────────────────────────────────────────────────
  const handleSave = () => {
    if (!modal) return;
    setData(d => updateNodeById(d, modal.nodeId, n => ({
      ...n, label: modalForm.label || n.label, note: modalForm.note,
      priority: parseInt(modalForm.priority), importance: parseInt(modalForm.importance), color: modalForm.color,
    })));
    setModal(null);
    showToast("✅ 저장됐어요");
  };

  // ── Delete ──────────────────────────────────────────────────────────────
  const handleDelete = (id) => {
    if (id === "root") return;
    setData(d => deleteNodeById(d, id));
    setModal(null); setSelected(null);
    showToast("🗑 삭제됐어요");
  };

  // ── Add child from view modal ────────────────────────────────────────────
  const handleAddChildFromModal = (parentId) => {
    setModal(null);
    setTimeout(() => openAddModal(parentId), 120);
  };

  // ── Pan & zoom ──────────────────────────────────────────────────────────
  const handleWheel = e => {
    e.preventDefault();
    const nz = Math.min(2.5, Math.max(0.3, zoom - e.deltaY * 0.001));
    currentZoom.current = nz; setZoom(nz);
  };
  const onSvgDown = e => {
    if (e.target.tagName === "svg" || e.target.tagName === "rect") {
      isPanning.current = true; lastPos.current = { x: e.clientX, y: e.clientY };
    }
  };
  const onSvgMove = e => {
    if (!isPanning.current) return;
    const dx = e.clientX - lastPos.current.x, dy = e.clientY - lastPos.current.y;
    const np = { x: pan.x + dx, y: pan.y + dy };
    setPan(np); currentPan.current = np;
    lastPos.current = { x: e.clientX, y: e.clientY };
  };
  const onSvgUp = () => { isPanning.current = false; };

  const onTouchStart = e => {
    if (e.touches.length === 1) lastTouch.current = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    else if (e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX, dy = e.touches[0].clientY - e.touches[1].clientY;
      lastDist.current = Math.sqrt(dx*dx+dy*dy);
    }
  };
  const onTouchMove = e => {
    e.preventDefault();
    if (e.touches.length === 1 && lastTouch.current) {
      const dx = e.touches[0].clientX - lastTouch.current.x, dy = e.touches[0].clientY - lastTouch.current.y;
      const np = { x: pan.x + dx, y: pan.y + dy };
      setPan(np); currentPan.current = np;
      lastTouch.current = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    } else if (e.touches.length === 2 && lastDist.current) {
      const dx = e.touches[0].clientX - e.touches[1].clientX, dy = e.touches[0].clientY - e.touches[1].clientY;
      const dist = Math.sqrt(dx*dx+dy*dy);
      const nz = Math.min(2.5, Math.max(0.3, zoom * (dist/lastDist.current)));
      setZoom(nz); currentZoom.current = nz;
      lastDist.current = dist;
    }
  };

  // ── Export/Import ───────────────────────────────────────────────────────
  const handleExport = () => {
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:"application/json"}));
    a.download = `mindmap_나_${new Date().toISOString().slice(0,10)}.json`; a.click();
    showToast("📦 내보내기 완료");
  };
  const handleImport = e => {
    const file = e.target.files[0]; if (!file) return;
    const r = new FileReader();
    r.onload = ev => { try { setData(JSON.parse(ev.target.result)); showToast("📥 가져오기 완료"); } catch { showToast("❌ 파일 오류"); } };
    r.readAsText(file); e.target.value = "";
  };

  // ── List ────────────────────────────────────────────────────────────────
  const allNodes = data ? flattenNodes(data).filter(n => n.id !== "root") : [];
  const listFiltered = listFilter === "all" ? allNodes
    : allNodes.filter(n => n.path[1] === findNodeById(data, listFilter)?.label);
  const listSorted = [...listFiltered].sort((a,b) => {
    if (listSort === "priority") return a.priority !== b.priority ? a.priority-b.priority : b.importance-a.importance;
    if (listSort === "importance") return b.importance-a.importance;
    return a.label.localeCompare(b.label,"ko");
  });

  // ── 부모 선택 옵션 for addModal ─────────────────────────────────────────
  // root + root의 직계 자식들 + 모든 노드 (계층 표시)
  const parentOptions = data ? flattenNodes(data).map(n => ({
    id: n.id,
    label: n.path.join(" › "),
    color: n.color,
    depth: n.path.length - 1,
  })) : [];

  if (!loaded) return (
    <div style={{background:"#0d1117",minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{color:"#f0c040",fontSize:14}}>불러오는 중…</div>
    </div>
  );

  return (
    <div style={{fontFamily:"'Noto Sans KR',sans-serif",background:"#0d1117",minHeight:"100vh",color:"#e6edf3",userSelect:"none",overflow:"hidden"}}>
      <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet"/>
      <style>{`
        @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
        @keyframes pulse{0%,100%{opacity:.5;r:10}50%{opacity:1;r:14}}
        @keyframes toast{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
        @keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
        .nd:hover circle.mc{filter:brightness(1.18);}
        svg{touch-action:none;}
      `}</style>

      {/* ── Top Bar ── */}
      <div style={{position:"fixed",top:0,left:0,right:0,zIndex:100,display:"flex",alignItems:"center",gap:6,padding:"9px 14px",background:"rgba(13,17,23,0.95)",backdropFilter:"blur(14px)",borderBottom:"1px solid #21262d"}}>
        <span style={{fontWeight:700,fontSize:15,color:"#f0c040",marginRight:4,flexShrink:0}}>🌱 나의 맵</span>
        <button onClick={()=>setTab("map")} style={tabBtn(tab==="map")}>맵</button>
        <button onClick={()=>setTab("list")} style={tabBtn(tab==="list")}>목록</button>
        <div style={{flex:1}}/>
        <button onClick={()=>{setShowSearch(s=>!s);if(showSearch)setSearchQ("");}} style={iconBtn(showSearch)}>🔍</button>
        <button onClick={handleExport} style={iconBtn(false)}>⬇</button>
        <label style={{...iconBtn(false),cursor:"pointer"}}>⬆<input type="file" accept=".json" onChange={handleImport} style={{display:"none"}}/></label>
        <button onClick={()=>{setPan({x:0,y:0});currentPan.current={x:0,y:0};setZoom(0.85);currentZoom.current=0.85;}} style={iconBtn(false)}>⊙</button>
      </div>

      {/* ── Search ── */}
      {showSearch && (
        <div style={{position:"fixed",top:49,left:0,right:0,zIndex:99,padding:"10px 14px",background:"rgba(13,17,23,0.98)",borderBottom:"1px solid #21262d",animation:"fadeUp .18s ease"}}>
          <input autoFocus value={searchQ} onChange={e=>setSearchQ(e.target.value)} placeholder="생각, 아이디어 검색…"
            style={{width:"100%",padding:"10px 14px",borderRadius:10,border:"1px solid #30363d",background:"#161b22",color:"#e6edf3",fontSize:14,boxSizing:"border-box",outline:"none"}}/>
          {searchResults.length>0 && (
            <div style={{marginTop:8,maxHeight:220,overflowY:"auto",display:"flex",flexDirection:"column",gap:4}}>
              {searchResults.map(r=>(
                <div key={r.id} onClick={()=>{setShowSearch(false);setSearchQ("");setTab("map");setTimeout(()=>handleNodeClick(r.id),60);}}
                  style={{padding:"9px 12px",borderRadius:8,background:"#161b22",cursor:"pointer",borderLeft:`3px solid ${r.color||"#f0c040"}`,animation:"fadeUp .15s ease"}}>
                  <div style={{fontSize:13,fontWeight:600}}>{r.label}</div>
                  <div style={{fontSize:10,color:"#8b949e"}}>{r.path.join(" › ")}</div>
                  {r.note&&<div style={{fontSize:11,color:"#6e7681",marginTop:2}}>{r.note.slice(0,65)}</div>}
                </div>
              ))}
            </div>
          )}
          {searchQ.trim()&&!searchResults.length&&<div style={{padding:"10px 4px",color:"#484f58",fontSize:13}}>결과 없음</div>}
        </div>
      )}

      {/* ── Map View ── */}
      {tab==="map"&&(
        <svg width={dim.w} height={dim.h} style={{display:"block",cursor:isPanning.current?"grabbing":"grab"}}
          onWheel={handleWheel}
          onMouseDown={onSvgDown} onMouseMove={onSvgMove} onMouseUp={onSvgUp} onMouseLeave={onSvgUp}
          onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={()=>{lastTouch.current=null;lastDist.current=null;}}>
          <defs>
            <radialGradient id="bg" cx="50%" cy="50%" r="70%">
              <stop offset="0%" stopColor="#161b22"/><stop offset="100%" stopColor="#0d1117"/>
            </radialGradient>
            <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
              <feGaussianBlur stdDeviation="3.5" result="b"/>
              <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
            <filter id="glow2" x="-60%" y="-60%" width="220%" height="220%">
              <feGaussianBlur stdDeviation="9" result="b"/>
              <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>
          <rect width={dim.w} height={dim.h} fill="url(#bg)"
            onMouseDown={onSvgDown} onTouchStart={onTouchStart}/>

          {/* subtle dot grid */}
          {Array.from({length:Math.ceil(dim.h/50)},(_,r)=>
            Array.from({length:Math.ceil(dim.w/50)},(_,c)=>(
              <circle key={`${r}-${c}`} cx={c*50+(pan.x%50)} cy={r*50+(pan.y%50)} r={1} fill="#ffffff" fillOpacity={0.035}/>
            ))
          )}

          <g transform={`translate(${(1-zoom)*cx},${(1-zoom)*cy}) scale(${zoom})`}>

            {/* Edges */}
            {edges.map(e=>{
              const f=posMap[e.from],t=posMap[e.to]; if(!f||!t) return null;
              const tn=findNodeById(data,e.to);
              const hl=selected===e.from||selected===e.to;
              return <path key={e.from+e.to} d={bezierPath(f.x,f.y,t.x,t.y)} fill="none"
                stroke={tn?.color||"#30363d"} strokeWidth={hl?2.5:f.depth===0?1.8:1.2}
                strokeOpacity={hl?0.85:0.28}/>;
            })}

            {/* Nodes */}
            {positions.map(({id,x,y,depth,node})=>{
              const r=nodeR(depth), fs=nodeFS(depth);
              const isSel=selected===id, isHov=hoveredId===id;
              const er=isHov?r+3:r;
              const label=node.label;
              // 텍스트 두 줄 분리: 4자 초과면 절반씩
              const lines=label.length>4
                ?[label.slice(0,Math.ceil(label.length/2)),label.slice(Math.ceil(label.length/2))]
                :[label];
              return (
                <g key={id} className="nd"
                  onClick={()=>handleNodeClick(id)}
                  onMouseEnter={()=>setHoveredId(id)}
                  onMouseLeave={()=>setHoveredId(null)}
                  style={{cursor:"pointer"}}>
                  {/* pulse ring when selected */}
                  {isSel&&<circle cx={x} cy={y} r={r+9} fill="none" stroke={node.color} strokeWidth={1.5} strokeOpacity={0.45}
                    style={{animation:"pulse 2s ease infinite"}}/>}
                  {depth===0&&<circle cx={x} cy={y} r={r+18} fill={node.color} fillOpacity={0.1} filter="url(#glow2)"/>}
                  <circle className="mc" cx={x} cy={y} r={er}
                    fill={node.color} fillOpacity={depth===0?1:0.9}
                    stroke={isSel?"#fff":isHov?node.color:"rgba(255,255,255,0.1)"}
                    strokeWidth={isSel?2.5:isHov?2:1}
                    filter={depth<=1?"url(#glow)":"none"}
                    style={{transition:"r .12s,filter .12s"}}/>
                  {depth===0&&<circle cx={x} cy={y} r={r-8} fill="rgba(0,0,0,0.22)"/>}
                  {lines.map((w,i)=>(
                    <text key={i} x={x} y={y+(lines.length>1?(i===0?-fs*.42:fs*.82):fs*.35)}
                      textAnchor="middle" fill={depth===0?"#1a1a2e":"#fff"}
                      fontSize={fs} fontWeight={depth<=1?700:500}
                      style={{pointerEvents:"none",fontFamily:"Noto Sans KR,sans-serif"}}>
                      {w}
                    </text>
                  ))}
                  {/* 중요도 ≥4 빨간 점 */}
                  {depth>0&&(node.importance>=4)&&(
                    <circle cx={x+er-3} cy={y-er+3} r={4}
                      fill={node.importance===5?"#ff4757":"#ffa502"} stroke="#0d1117" strokeWidth={1}/>
                  )}
                  {/* 하위 수 뱃지 */}
                  {(node.children?.length||0)>0&&depth>0&&(
                    <g>
                      <circle cx={x-er+5} cy={y+er-5} r={6.5} fill="#21262d" stroke={node.color} strokeWidth={1}/>
                      <text x={x-er+5} y={y+er-2} textAnchor="middle" fill={node.color} fontSize={7} fontWeight={700}
                        style={{pointerEvents:"none"}}>{node.children.length}</text>
                    </g>
                  )}
                </g>
              );
            })}
          </g>
        </svg>
      )}

      {/* ── List View ── */}
      {tab==="list"&&(
        <div style={{paddingTop:49,height:"100vh",overflowY:"auto",boxSizing:"border-box"}}>
          {/* 필터 + 정렬 */}
          <div style={{padding:"8px 14px",display:"flex",gap:6,overflowX:"auto",borderBottom:"1px solid #21262d",background:"rgba(13,17,23,0.94)",backdropFilter:"blur(8px)",position:"sticky",top:49,zIndex:80,alignItems:"center"}}>
            <button onClick={()=>setListFilter("all")} style={chipBtn(listFilter==="all","#f0c040")}>전체</button>
            {(data?.children||[]).map(c=>(
              <button key={c.id} onClick={()=>setListFilter(c.id)}
                style={chipBtn(listFilter===c.id, c.color)}>{c.label}</button>
            ))}
            <div style={{flex:1}}/>
            <select value={listSort} onChange={e=>setListSort(e.target.value)}
              style={{background:"#21262d",color:"#8b949e",border:"1px solid #30363d",borderRadius:8,padding:"4px 8px",fontSize:11,cursor:"pointer",flexShrink:0}}>
              <option value="priority">우선순위</option>
              <option value="importance">중요도</option>
              <option value="alpha">가나다</option>
            </select>
          </div>

          <div style={{padding:"12px 14px",maxWidth:600,margin:"0 auto"}}>
            <div style={{fontSize:11,color:"#484f58",marginBottom:10}}>총 {listSorted.length}개</div>
            {listSorted.map((node,idx)=>(
              <div key={node.id}
                onClick={()=>{setTab("map");setTimeout(()=>handleNodeClick(node.id),60);}}
                style={{padding:"12px 14px",borderRadius:12,marginBottom:8,background:"#161b22",
                  borderLeft:`4px solid ${node.color}`,cursor:"pointer",display:"flex",gap:10,alignItems:"center",
                  animation:`fadeUp .2s ease ${idx*.02}s both`}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:600,fontSize:14,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{node.label}</div>
                  <div style={{fontSize:10,color:"#8b949e",marginTop:2}}>{node.path.join(" › ")}</div>
                  {node.note&&<div style={{fontSize:11,color:"#6e7681",marginTop:3,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{node.note}</div>}
                </div>
                <div style={{textAlign:"right",flexShrink:0}}>
                  <div style={{fontSize:10,color:"#8b949e"}}>{priorityLabel(node.priority)}</div>
                  <div style={{fontSize:10,color:"#f0c040",letterSpacing:1}}>{importanceStars(node.importance)}</div>
                </div>
              </div>
            ))}
            {listSorted.length===0&&(
              <div style={{textAlign:"center",padding:50,color:"#484f58"}}>
                <div style={{fontSize:28,marginBottom:8}}>🌱</div>
                <div style={{fontSize:13}}>항목이 없어요</div>
              </div>
            )}
          </div>
        </div>
      )}

      {/* ── Map 컨트롤 ── */}
      {tab==="map"&&(
        <>
          <div style={{position:"fixed",bottom:22,right:14,display:"flex",flexDirection:"column",gap:6,zIndex:90}}>
            <button onClick={()=>{const nz=Math.min(2.5,zoom+0.18);setZoom(nz);currentZoom.current=nz;}} style={roundBtn}>＋</button>
            <button onClick={()=>{const nz=Math.max(0.3,zoom-0.18);setZoom(nz);currentZoom.current=nz;}} style={roundBtn}>－</button>
          </div>
          {/* ＋ 주제 추가 버튼 */}
          <div style={{position:"fixed",bottom:22,left:14,zIndex:90}}>
            <button onClick={()=>openAddModal("root")}
              style={{padding:"11px 20px",background:"#f0c040",color:"#1a1a2e",border:"none",borderRadius:24,fontWeight:700,fontSize:13,cursor:"pointer",boxShadow:"0 4px 18px rgba(240,192,64,.35)"}}>
              ＋ 주제 추가
            </button>
          </div>
        </>
      )}

      {/* ── Toast ── */}
      {toast&&(
        <div style={{position:"fixed",bottom:82,left:"50%",transform:"translateX(-50%)",background:"#21262d",color:"#e6edf3",padding:"10px 18px",borderRadius:20,fontSize:13,fontWeight:600,zIndex:300,animation:"toast .2s ease",whiteSpace:"nowrap",border:"1px solid #30363d"}}>
          {toast}
        </div>
      )}

      {/* ══════════════════════════════════════════════════
          ── 주제 추가 모달 (카테고리 선택 포함) ──
          ══════════════════════════════════════════════════ */}
      {addModal&&(
        <div style={{position:"fixed",inset:0,zIndex:210,display:"flex",alignItems:"flex-end",justifyContent:"center",background:"rgba(0,0,0,0.65)"}}
          onClick={e=>e.target===e.currentTarget&&setAddModal(false)}>
          <div style={{background:"#161b22",borderRadius:"22px 22px 0 0",width:"100%",maxWidth:560,padding:"0 20px 40px",maxHeight:"90vh",overflowY:"auto",animation:"sheetUp .25s cubic-bezier(0.4,0,0.2,1)"}}>
            <div style={{display:"flex",justifyContent:"center",padding:"14px 0 0"}}>
              <div style={{width:36,height:4,borderRadius:2,background:"#f0c040"}}/>
            </div>
            <div style={{fontWeight:700,fontSize:16,marginBottom:18,marginTop:16}}>새 항목 추가</div>

            {/* 소속 카테고리 선택 */}
            <label style={lbl}>📂 소속 카테고리</label>
            <div style={{display:"flex",flexDirection:"column",gap:5,marginBottom:6,maxHeight:200,overflowY:"auto",padding:"2px 0"}}>
              {/* root 옵션 */}
              <div onClick={()=>setAddForm(f=>({...f,parentId:"root"}))}
                style={parentOpt(addForm.parentId==="root","#f0c040")}>
                <div style={{width:8,height:8,borderRadius:"50%",background:"#f0c040",flexShrink:0}}/>
                <span style={{fontSize:13,fontWeight:600}}>나 (최상위)</span>
              </div>
              {/* depth1 자식들 — 큰 카테고리 */}
              {(data?.children||[]).map(c=>(
                <div key={c.id}>
                  <div onClick={()=>setAddForm(f=>({...f,parentId:c.id}))}
                    style={parentOpt(addForm.parentId===c.id,c.color)}>
                    <div style={{width:8,height:8,borderRadius:"50%",background:c.color,flexShrink:0}}/>
                    <span style={{fontSize:13,fontWeight:600}}>{c.label}</span>
                  </div>
                  {/* depth2 자식들 — 들여쓰기 */}
                  {(c.children||[]).map(cc=>(
                    <div key={cc.id} onClick={()=>setAddForm(f=>({...f,parentId:cc.id}))}
                      style={{...parentOpt(addForm.parentId===cc.id,cc.color),marginLeft:16,marginTop:4}}>
                      <div style={{width:6,height:6,borderRadius:"50%",background:cc.color,flexShrink:0}}/>
                      <span style={{fontSize:12,color:"#c9d1d9"}}>{cc.label}</span>
                      {(cc.children?.length||0)>0&&<span style={{fontSize:10,color:"#484f58",marginLeft:"auto"}}>하위{cc.children.length}</span>}
                    </div>
                  ))}
                </div>
              ))}
            </div>

            {/* 선택된 부모 표시 */}
            <div style={{fontSize:11,color:"#8b949e",marginBottom:14,padding:"6px 10px",background:"#0d1117",borderRadius:8}}>
              📍 추가 위치: <b style={{color:"#f0c040"}}>{findNodeById(data,addForm.parentId)?.label||"나"}</b>
            </div>

            <label style={lbl}>제목</label>
            <input value={addForm.label} onChange={e=>setAddForm(f=>({...f,label:e.target.value}))}
              placeholder="항목 이름을 입력하세요"
              style={{...inp,marginBottom:4}}
              onKeyDown={e=>e.key==="Enter"&&handleAddConfirm()}/>

            <label style={lbl}>메모 (선택)</label>
            <textarea value={addForm.note} onChange={e=>setAddForm(f=>({...f,note:e.target.value}))}
              style={{...inp,minHeight:70,resize:"vertical"}} placeholder="생각, 아이디어…"/>

            <label style={lbl}>우선순위</label>
            <div style={{display:"flex",gap:5,marginBottom:12}}>
              {[1,2,3,4,5].map(v=>(
                <button key={v} onClick={()=>setAddForm(f=>({...f,priority:v}))}
                  style={{flex:1,padding:"7px 2px",borderRadius:10,border:`1.5px solid ${parseInt(addForm.priority)===v?"#f0c040":"#30363d"}`,
                    background:parseInt(addForm.priority)===v?"#f0c04022":"#0d1117",
                    color:parseInt(addForm.priority)===v?"#f0c040":"#6e7681",cursor:"pointer",fontSize:10,fontWeight:600}}>
                  {["최우선","높음","보통","낮음","참고"][v-1]}
                </button>
              ))}
            </div>

            <label style={lbl}>중요도</label>
            <div style={{display:"flex",gap:6,marginBottom:14}}>
              {[1,2,3,4,5].map(v=>(
                <button key={v} onClick={()=>setAddForm(f=>({...f,importance:v}))}
                  style={{flex:1,padding:"8px 0",borderRadius:10,border:`1.5px solid ${parseInt(addForm.importance)>=v?"#f0c040":"#30363d"}`,
                    background:"transparent",color:parseInt(addForm.importance)>=v?"#f0c040":"#484f58",cursor:"pointer",fontSize:15}}>★</button>
              ))}
            </div>

            <label style={lbl}>색상</label>
            <div style={{display:"flex",gap:7,flexWrap:"wrap",marginBottom:20}}>
              {COLORS.map(c=>(
                <div key={c} onClick={()=>setAddForm(f=>({...f,color:c}))}
                  style={{width:28,height:28,borderRadius:"50%",background:c,cursor:"pointer",
                    border:addForm.color===c?"3px solid #fff":"2px solid transparent",
                    transition:"transform .1s",transform:addForm.color===c?"scale(1.2)":"scale(1)"}}/>
              ))}
            </div>

            <div style={{display:"flex",gap:8}}>
              <button onClick={handleAddConfirm} style={primBtn}>추가하기</button>
              <button onClick={()=>setAddModal(false)} style={ghoBtn}>취소</button>
            </div>
          </div>
        </div>
      )}

      {/* ══════════════════════════════════════════════════
          ── 노드 뷰 / 편집 모달 ──
          ══════════════════════════════════════════════════ */}
      {modal&&(()=>{
        const node=findNodeById(data,modal.nodeId); if(!node) return null;
        const isEdit=modal.type==="edit";
        const depth=getDepth(data,modal.nodeId);
        return (
          <div style={{position:"fixed",inset:0,zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center",background:"rgba(0,0,0,0.65)"}}
            onClick={e=>e.target===e.currentTarget&&setModal(null)}>
            <div style={{background:"#161b22",borderRadius:"22px 22px 0 0",width:"100%",maxWidth:560,padding:"0 20px 36px",maxHeight:"88vh",overflowY:"auto",animation:"sheetUp .22s cubic-bezier(0.4,0,0.2,1)"}}>
              <div style={{display:"flex",justifyContent:"center",padding:"14px 0 0"}}>
                <div style={{width:36,height:4,borderRadius:2,background:node.color}}/>
              </div>

              {isEdit?(
                <div style={{paddingTop:16}}>
                  <div style={{fontWeight:700,fontSize:16,marginBottom:16}}>노드 편집</div>

                  <label style={lbl}>제목</label>
                  <input value={modalForm.label} onChange={e=>setModalForm({...modalForm,label:e.target.value})} style={inp} autoFocus/>

                  <label style={lbl}>메모</label>
                  <textarea value={modalForm.note} onChange={e=>setModalForm({...modalForm,note:e.target.value})}
                    style={{...inp,minHeight:80,resize:"vertical"}} placeholder="생각, 아이디어…"/>

                  <label style={lbl}>우선순위</label>
                  <div style={{display:"flex",gap:5,marginBottom:12}}>
                    {[1,2,3,4,5].map(v=>(
                      <button key={v} onClick={()=>setModalForm({...modalForm,priority:v})}
                        style={{flex:1,padding:"7px 2px",borderRadius:10,border:`1.5px solid ${parseInt(modalForm.priority)===v?"#f0c040":"#30363d"}`,
                          background:parseInt(modalForm.priority)===v?"#f0c04022":"#0d1117",
                          color:parseInt(modalForm.priority)===v?"#f0c040":"#6e7681",cursor:"pointer",fontSize:10,fontWeight:600}}>
                        {["최우선","높음","보통","낮음","참고"][v-1]}
                      </button>
                    ))}
                  </div>

                  <label style={lbl}>중요도</label>
                  <div style={{display:"flex",gap:6,marginBottom:14}}>
                    {[1,2,3,4,5].map(v=>(
                      <button key={v} onClick={()=>setModalForm({...modalForm,importance:v})}
                        style={{flex:1,padding:"8px 0",borderRadius:10,border:`1.5px solid ${parseInt(modalForm.importance)>=v?"#f0c040":"#30363d"}`,
                          background:"transparent",color:parseInt(modalForm.importance)>=v?"#f0c040":"#484f58",cursor:"pointer",fontSize:15}}>★</button>
                    ))}
                  </div>

                  <label style={lbl}>색상</label>
                  <div style={{display:"flex",gap:7,flexWrap:"wrap",marginBottom:20}}>
                    {COLORS.map(c=>(
                      <div key={c} onClick={()=>setModalForm({...modalForm,color:c})}
                        style={{width:28,height:28,borderRadius:"50%",background:c,cursor:"pointer",
                          border:modalForm.color===c?"3px solid #fff":"2px solid transparent",
                          transition:"transform .1s",transform:modalForm.color===c?"scale(1.2)":"scale(1)"}}/>
                    ))}
                  </div>

                  <div style={{display:"flex",gap:8}}>
                    <button onClick={handleSave} style={primBtn}>저장하기</button>
                    <button onClick={()=>setModal(null)} style={ghoBtn}>취소</button>
                  </div>
                </div>
              ):(
                <div style={{paddingTop:16}}>
                  <div style={{display:"flex",alignItems:"flex-start",gap:10,marginBottom:12}}>
                    <div style={{width:12,height:12,borderRadius:"50%",background:node.color,marginTop:5,flexShrink:0}}/>
                    <div style={{fontWeight:700,fontSize:20,lineHeight:1.3}}>{node.label}</div>
                  </div>

                  <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>
                    <span style={{background:"#21262d",padding:"4px 12px",borderRadius:20,fontSize:11}}>{priorityLabel(node.priority)}</span>
                    <span style={{background:"#21262d",padding:"4px 12px",borderRadius:20,fontSize:11,color:"#f0c040",letterSpacing:1}}>{importanceStars(node.importance)}</span>
                    {(node.children?.length||0)>0&&(
                      <span style={{background:node.color+"22",color:node.color,padding:"4px 12px",borderRadius:20,fontSize:11}}>하위 {node.children.length}개</span>
                    )}
                  </div>

                  {node.note?(
                    <div style={{background:"#0d1117",padding:"14px 16px",borderRadius:12,fontSize:13,lineHeight:1.7,color:"#c9d1d9",marginBottom:16,borderLeft:`3px solid ${node.color}40`}}>
                      {node.note}
                    </div>
                  ):(
                    <div style={{color:"#484f58",fontSize:13,marginBottom:16,fontStyle:"italic"}}>메모가 없어요. 편집해서 추가해보세요.</div>
                  )}

                  {(node.children?.length||0)>0&&(
                    <div style={{marginBottom:16}}>
                      <div style={{fontSize:11,color:"#6e7681",marginBottom:8,textTransform:"uppercase",letterSpacing:.5}}>하위 항목</div>
                      <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                        {node.children.map(c=>(
                          <span key={c.id} onClick={()=>handleNodeClick(c.id)}
                            style={{background:c.color+"28",color:c.color,padding:"5px 12px",borderRadius:20,fontSize:12,cursor:"pointer",fontWeight:600,border:`1px solid ${c.color}44`}}>
                            {c.label}
                          </span>
                        ))}
                      </div>
                    </div>
                  )}

                  <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                    <button onClick={()=>setModal({...modal,type:"edit"})} style={primBtn}>✏️ 편집</button>
                    <button onClick={()=>handleAddChildFromModal(modal.nodeId)} style={ghoBtn}>＋ 하위 추가</button>
                    {modal.nodeId!=="root"&&<button onClick={()=>handleDelete(modal.nodeId)} style={danBtn}>삭제</button>}
                    <button onClick={()=>setModal(null)} style={ghoBtn}>닫기</button>
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      })()}
    </div>
  );
}

// ─── Styles ───────────────────────────────────────────────────────────────────
const tabBtn=a=>({padding:"5px 14px",borderRadius:20,border:"none",cursor:"pointer",fontSize:12,fontWeight:600,
  background:a?"#f0c040":"#21262d",color:a?"#1a1a2e":"#8b949e",transition:"all .15s"});
const iconBtn=a=>({padding:"7px 10px",background:a?"#f0c04022":"#21262d",border:`1px solid ${a?"#f0c040":"#30363d"}`,
  borderRadius:8,cursor:"pointer",fontSize:14,color:a?"#f0c040":"#8b949e"});
const chipBtn=(a,color)=>({padding:"5px 12px",borderRadius:20,
  border:`1px solid ${a?color:"#30363d"}`,cursor:"pointer",fontSize:11,fontWeight:600,
  background:a?color:"transparent",color:a?"#0d1117":"#8b949e",whiteSpace:"nowrap",transition:"all .15s"});
const roundBtn={width:36,height:36,borderRadius:"50%",background:"#21262d",border:"1px solid #30363d",
  color:"#c9d1d9",fontSize:20,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1};
const lbl={display:"block",fontSize:11,color:"#6e7681",marginBottom:5,marginTop:14,fontWeight:600,textTransform:"uppercase",letterSpacing:.6};
const inp={width:"100%",padding:"11px 13px",borderRadius:10,border:"1px solid #30363d",background:"#0d1117",
